appId: com.agentcode.app
productName: Agent Code
artifactName: "${productName}-${version}-${arch}.${ext}"
directories:
  output: release
asar: true
asarUnpack:
  - out/main/mitmAddon.py
  # Bundled third-party runtime tools (mitmproxy, tmux, ...). Each is
  # spawned as a real executable / extracted from a real tar.gz, so
  # the whole tree must live on the filesystem rather than inside the
  # asar virtual FS. See third_party/<tool>/README.md and issue #119.
  - out/main/runtime/**/*
files:
  - out/**
  - package.json
  - node_modules/**
  - "!node_modules/.cache/**"
  - "!vendor/**"
  - "!testing/**"
  - "!docs/**"
  - "!scripts/**"
  - "!src/**"
  - "!**/*.map"
  - "!**/test/**"
  - "!**/tests/**"
  - "!.proxy-testing/**"
  - "!.tsc-out/**"
extraMetadata:
  main: out/main/index.js
mac:
  category: public.app-category.developer-tools
  target:
    - dmg
    - zip
  hardenedRuntime: true
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.plist
dmg:
  artifactName: "${productName}-${version}-${arch}.${ext}"

<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Claude Proxy Stream Demo</title>
    <link rel="stylesheet" href="../../node_modules/@xterm/xterm/css/xterm.css" />
    <link rel="stylesheet" href="./renderer.css" />
  </head>
  <body>
    <div class="shell">
      <section class="pane pane-terminal">
        <header class="pane-header">
          <div>
            <h1>Claude Terminal</h1>
            <p id="status">Starting…</p>
          </div>
          <div class="meta" id="meta"></div>
        </header>
        <div id="terminal"></div>
      </section>
      <section class="pane pane-stream">
        <header class="pane-header">
          <div>
            <h1>Decrypted Stream</h1>
            <p>Live `text_delta` aggregation from intercepted `/v1/messages` SSE.</p>
          </div>
        </header>
        <div class="stream-body">
          <pre id="streamText" class="stream-text"></pre>
          <div class="event-log-wrap">
            <div class="event-log-title">Recent Stream Events</div>
            <pre id="eventLog" class="event-log"></pre>
          </div>
        </div>
      </section>
    </div>
    <script src="./renderer.js"></script>
  </body>
  </html>

name: Release macOS App

on:
  workflow_dispatch:
    inputs:
      publish_release:
        description: "Create a GitHub Release with the built artifacts"
        required: true
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
      release_tag:
        description: "Beta release tag to create when publish_release is true"
        required: true
        default: "beta-0.0.2"
      release_name:
        description: "Release name to create when publish_release is true"
        required: true
        default: "Agent Studio Code 0.0.2 Beta"

concurrency:
  group: release-macos
  cancel-in-progress: false

jobs:
  validate-release:
    runs-on: ubuntu-latest
    steps:
      - name: Validate release secrets
        env:
          PUBLISH_RELEASE: ${{ github.event.inputs.publish_release }}
          CSC_LINK: ${{ secrets.CSC_LINK }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          if [ "$PUBLISH_RELEASE" != "true" ]; then
            exit 0
          fi

          missing=()
          [ -z "${CSC_LINK:-}" ] && missing+=(CSC_LINK)
          [ -z "${APPLE_ID:-}" ] && missing+=(APPLE_ID)
          [ -z "${APPLE_APP_SPECIFIC_PASSWORD:-}" ] && missing+=(APPLE_APP_SPECIFIC_PASSWORD)
          [ -z "${APPLE_TEAM_ID:-}" ] && missing+=(APPLE_TEAM_ID)
          if [ "${#missing[@]}" -gt 0 ]; then
            printf 'Cannot publish a macOS release without signing/notarization secrets: %s\n' "${missing[*]}"
            exit 1
          fi

  build-app:
    needs: validate-release
    runs-on: macos-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure submodule auth
        env:
          SUBMODULE_PAT: ${{ secrets.SUBMODULE_PAT }}
          SUBMODULE_SSH_KEY: ${{ secrets.SUBMODULE_SSH_KEY }}
        run: |
          if [ -n "$SUBMODULE_PAT" ]; then
            echo "::add-mask::$SUBMODULE_PAT"
            git config --global url."https://x-access-token:${SUBMODULE_PAT}@github.com/Juliusolsson05/".insteadOf "https://github.com/Juliusolsson05/"
            git config --global url."https://x-access-token:${SUBMODULE_PAT}@github.com/Juliusolsson05/".insteadOf "git@github-personal:Juliusolsson05/"
            exit 0
          fi

          if [ -z "$SUBMODULE_SSH_KEY" ]; then
            echo "Either SUBMODULE_PAT or SUBMODULE_SSH_KEY must be configured."
            exit 1
          fi

          mkdir -p ~/.ssh
          printf '%s' "$SUBMODULE_SSH_KEY" | perl -pe 's/\\n/\n/g' > ~/.ssh/submodule_key
          printf '\n' >> ~/.ssh/submodule_key
          chmod 600 ~/.ssh/submodule_key
          ssh-keygen -y -f ~/.ssh/submodule_key > /dev/null
          ssh-keyscan github.com >> ~/.ssh/known_hosts
          cat >> ~/.ssh/config <<'EOF'
          Host github-personal
            HostName github.com
            User git
            IdentityFile ~/.ssh/submodule_key
            IdentitiesOnly yes
          EOF
          git config --global url."git@github-personal:Juliusolsson05/".insteadOf "https://github.com/Juliusolsson05/"

      - name: Checkout submodules
        # Juliusolsson05 submodules use SUBMODULE_PAT or SUBMODULE_SSH_KEY;
        # public third-party submodules keep HTTPS.
        run: git submodule update --init --recursive

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci --include=dev

      - name: Build app
        run: npm run build

      - name: Upload app build
        uses: actions/upload-artifact@v4
        with:
          name: app-build
          path: out
          if-no-files-found: error

  package-macos:
    needs: build-app
    runs-on: macos-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure submodule auth
        env:
          SUBMODULE_PAT: ${{ secrets.SUBMODULE_PAT }}
          SUBMODULE_SSH_KEY: ${{ secrets.SUBMODULE_SSH_KEY }}
        run: |
          if [ -n "$SUBMODULE_PAT" ]; then
            echo "::add-mask::$SUBMODULE_PAT"
            git config --global url."https://x-access-token:${SUBMODULE_PAT}@github.com/Juliusolsson05/".insteadOf "https://github.com/Juliusolsson05/"
            git config --global url."https://x-access-token:${SUBMODULE_PAT}@github.com/Juliusolsson05/".insteadOf "git@github-personal:Juliusolsson05/"
            exit 0
          fi

          if [ -z "$SUBMODULE_SSH_KEY" ]; then
            echo "Either SUBMODULE_PAT or SUBMODULE_SSH_KEY must be configured."
            exit 1
          fi

          mkdir -p ~/.ssh
          printf '%s' "$SUBMODULE_SSH_KEY" | perl -pe 's/\\n/\n/g' > ~/.ssh/submodule_key
          printf '\n' >> ~/.ssh/submodule_key
          chmod 600 ~/.ssh/submodule_key
          ssh-keygen -y -f ~/.ssh/submodule_key > /dev/null
          ssh-keyscan github.com >> ~/.ssh/known_hosts
          cat >> ~/.ssh/config <<'EOF'
          Host github-personal
            HostName github.com
            User git
            IdentityFile ~/.ssh/submodule_key
            IdentitiesOnly yes
          EOF
          git config --global url."git@github-personal:Juliusolsson05/".insteadOf "https://github.com/Juliusolsson05/"

      - name: Checkout submodules
        # Juliusolsson05 submodules use SUBMODULE_PAT or SUBMODULE_SSH_KEY;
        # public third-party submodules keep HTTPS.
        run: git submodule update --init --recursive

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Cache Electron packages
        uses: actions/cache@v4
        with:
          path: |
            ~/Library/Caches/electron
            ~/Library/Caches/electron-builder
            ~/.cache/electron
            ~/.cache/electron-builder
          key: ${{ runner.os }}-electron-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-electron-

      - name: Install dependencies
        run: npm ci --include=dev

      - name: Download app build
        uses: actions/download-artifact@v4
        with:
          name: app-build
          path: out

      - name: Package macOS artifacts
        env:
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ -z "${CSC_LINK:-}" ]; then
            echo "CSC_LINK is not configured; building unsigned artifacts."
            export CSC_IDENTITY_AUTO_DISCOVERY=false
            unset CSC_LINK CSC_KEY_PASSWORD
            unset APPLE_ID APPLE_APP_SPECIFIC_PASSWORD APPLE_TEAM_ID
          fi
          npm run package:mac

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-release
          path: |
            release/*.dmg
            release/*.zip
            release/*.blockmap
          if-no-files-found: error

      - name: Create GitHub Release
        if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.publish_release == 'true' }}
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65
        with:
          tag_name: ${{ github.event.inputs.release_tag }}
          name: ${{ github.event.inputs.release_name }}
          prerelease: true
          files: |
            release/*.dmg
            release/*.zip
            release/*.blockmap
